<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    nav { background: #1f4fd6; padding: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    nav a { color: white; text-decoration: none; margin-right: 12px; font-size: 16px; }
    .logo { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; background: white; }
    .authRight { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .box { max-width: 700px; margin: 20px auto; background: white; padding: 18px; border-radius: 8px; }
    .productImg { width: 100%; max-height: 420px; object-fit: contain; border-radius: 8px; background: #f7f7f7; margin-bottom: 12px; }
    .btn { background: #2d6cdf; color: white; border: 0; padding: 10px 12px; border-radius: 4px; cursor: pointer; }
    .muted { color: #555; }

    @media (max-width: 768px) {
      nav { padding: 10px; gap: 8px; }
      nav a { font-size: 14px; margin-right: 8px; }
      .logo { width: 32px; height: 32px; }
      .authRight { width: 100%; justify-content: flex-end; }
      .box { margin: 12px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <nav>
    <img class="logo" src="../images/omnesMarketshop.jpeg" alt="Omnes logo">
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a href="product.html">Product</a>
    <a href="cart.html">Cart</a>
    <a href="add_product.html">Add Product</a>
    <a id="navLogin" href="login.html">Login</a>
    <a id="navRegister" href="register.html">Register</a>
    <span class="authRight">
      <a id="navLogout" href="#" onclick="logoutUser()" style="display:none;">Logout</a>
      <span id="navUser" style="display:none; color:white; font-size:16px;">Hi, User</span>
    </span>
  </nav>

  <div class="box">
    <h2>Checkout & Pay</h2>
    <p class="muted">Negotiation accepted. Please complete payment.</p>
    <img id="productImg" class="productImg" src="https://via.placeholder.com/700x400?text=Loading+Image" alt="Product image">
    <p id="productText">Product: Loading...</p>
    <p id="offerText">Accepted Offer: -</p>
    <button class="btn" id="payBtn">Pay Now (Demo)</button>
    <p id="msg" class="muted"></p>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var productId = params.get("product_id");
    var negotiationId = params.get("negotiation_id");
    var offer = params.get("offer");
    var userId = localStorage.getItem("user_id");
    var productFound = false;
    var checkoutAllowed = false;
    var payBtn = document.getElementById("payBtn");

    if (!userId) {
      alert("Please login first");
      location.replace("login.html");
    } else {

    // validate product id from url
    if (!productId || isNaN(Number(productId)) || !negotiationId || isNaN(Number(negotiationId))) {
      document.getElementById("productText").innerText = "Product: Invalid checkout request";
      document.getElementById("msg").innerText = "Missing valid product_id or negotiation_id.";
      payBtn.disabled = true;
    }

    document.getElementById("offerText").innerText = "Accepted Offer: €" + (offer || "-");

    // this picks first image from multiple images field
    function getMainImage(product) {
      if (product.images && product.images.trim() !== "") {
        var list = product.images.split(",");
        return list[0].trim();
      }
      return product.image || "https://via.placeholder.com/700x400?text=No+Image";
    }

    // this verifies accepted negotiation from server (not from URL)
    function verifyCheckout() {
      fetch("../backend/get_negotiation_messages.php?negotiation_id=" + negotiationId)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (!data.success || !data.negotiation) {
            document.getElementById("msg").innerText = "Negotiation not found.";
            payBtn.disabled = true;
            return;
          }

          var n = data.negotiation;
          if (String(n.product_id) !== String(productId)) {
            document.getElementById("msg").innerText = "Negotiation product mismatch.";
            payBtn.disabled = true;
            return;
          }
          if (String(n.buyer_id) !== String(userId)) {
            document.getElementById("msg").innerText = "This checkout does not belong to your account.";
            payBtn.disabled = true;
            return;
          }
          if (n.status !== "accepted") {
            document.getElementById("msg").innerText = "Negotiation is not accepted yet.";
            payBtn.disabled = true;
            return;
          }

          checkoutAllowed = true;
          document.getElementById("offerText").innerText = "Accepted Offer: €" + n.offer_price;
          loadProduct();
        });
    }

    // this loads product name/image only after verification
    function loadProduct() {
      fetch("../backend/get_products.php")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (!data.success) {
            document.getElementById("msg").innerText = "Could not load product details.";
            payBtn.disabled = true;
            return;
          }
          for (var i = 0; i < data.products.length; i++) {
            if (String(data.products[i].id) === String(productId)) {
              productFound = true;
              document.getElementById("productText").innerText = "Product: " + data.products[i].name;
              document.getElementById("productImg").src = getMainImage(data.products[i]);
              break;
            }
          }

          if (!productFound) {
            document.getElementById("productText").innerText = "Product: Not found";
            document.getElementById("msg").innerText = "This product id is invalid or deleted.";
            payBtn.disabled = true;
          }
        });
    }

    if (productId && !isNaN(Number(productId)) && negotiationId && !isNaN(Number(negotiationId))) {
      verifyCheckout();
    }

    // this completes demo payment by calling buy endpoint
    document.getElementById("payBtn").onclick = function() {
      if (!productFound) {
        alert("Cannot continue. Product not found.");
        return;
      }
      if (!checkoutAllowed) {
        alert("Checkout not allowed.");
        return;
      }

      payBtn.disabled = true;
      document.getElementById("msg").innerText = "Processing payment...";

      var fd = new FormData();
      fd.append("product_id", productId);
      fd.append("negotiation_id", negotiationId);

      fetch("../backend/buy_product.php", {
        method: "POST",
        body: fd
      })
      .then(function(res) {
        return res.json().then(function(r) {
          return { ok: res.ok, r: r };
        });
      })
      .then(function(out) {
        var r = out.r;
        document.getElementById("msg").innerText = (r && r.message) ? r.message : "";
        if (out.ok && r && r.success) {
          alert("Payment done. Order placed.");
          location.replace("index.html");
          return;
        }
        payBtn.disabled = false;
      })
      .catch(function(err) {
        document.getElementById("msg").innerText = "Network error: could not complete payment.";
        payBtn.disabled = false;
        if (typeof console !== "undefined" && console.error) {
          console.error(err);
        }
      });
    };

    }
  </script>

  <script>
    // this updates nav links based on login state
    function renderAuthNav() {
      var userId = localStorage.getItem("user_id");
      var userName = localStorage.getItem("user_name") || "User";
      var loginLink = document.getElementById("navLogin");
      var registerLink = document.getElementById("navRegister");
      var logoutLink = document.getElementById("navLogout");
      var userText = document.getElementById("navUser");

      if (!loginLink || !registerLink || !logoutLink || !userText) {
        return;
      }

      if (userId) {
        loginLink.style.display = "none";
        registerLink.style.display = "none";
        logoutLink.style.display = "inline";
        userText.style.display = "inline";
        userText.innerText = "Hi, " + userName;
      } else {
        loginLink.style.display = "inline";
        registerLink.style.display = "inline";
        logoutLink.style.display = "none";
        userText.style.display = "none";
      }
    }

    // this logs user out
    function logoutUser() {
      localStorage.removeItem("user_id");
      localStorage.removeItem("user_name");
      localStorage.removeItem("user_role");
      alert("Logged out");
      location.href = "index.html";
    }

    renderAuthNav();
  </script>
</body>
</html>
