<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnes MarketPlace - Cart</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    nav { background: #1f4fd6; padding: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    nav a { color: white; text-decoration: none; margin-right: 12px; font-size: 16px; }
    .logo { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; background: white; }
    .authRight { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .box { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; }
    .item { border-bottom: 1px solid #ddd; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
    .itemLeft { display: flex; align-items: center; gap: 10px; }
    .thumb { width: 64px; height: 64px; object-fit: contain; border-radius: 6px; background: #f7f7f7; border: 1px solid #eee; }
    .btn { background: #2d6cdf; color: white; border: 0; padding: 8px 10px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    .removeBtn { background: #d9534f; color: white; border: 0; padding: 6px 9px; border-radius: 4px; cursor: pointer; }
  

    @media (max-width: 768px) {
      nav { padding: 10px; gap: 8px; }
      nav a { font-size: 14px; margin-right: 8px; }
      .logo, .brand img { width: 32px !important; height: 32px !important; }
      .authRight { width: 100%; justify-content: flex-end; }

      .container, .wrap, .box { width: auto; margin: 12px; padding: 14px; }
      .cards { gap: 10px; }
      .card { width: 100% !important; box-sizing: border-box; }

      input, select, textarea, button, .btn { width: 100%; box-sizing: border-box; }
      .row, .heroActions, .slideBtns { flex-direction: column; }

      #cartBadge { margin-left: 0 !important; }
    }

  </style>
</head>
<body>
  <nav>
    <img class="logo" src="../images/omnesMarketshop.jpeg" alt="Omnes logo">
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a id="navAlerts" href="notifications.html">Alerts</a>
    <a id="navCart" href="cart.html">Cart</a>
    <a id="navAddProduct" href="add_product.html">Add Product</a>
    <a id="navAccount" href="account.html">My Account</a>
    <a id="navLogin" href="login.html">Login</a>
    <a id="navRegister" href="register.html">Register</a>
    <span class="authRight">
      <a id="navLogout" href="#" onclick="logoutUser()" style="display:none;">Logout</a>
      <span id="navUser" style="display:none; color:white; font-size:16px;">Hi, User</span>
    </span>
  </nav>

  <div class="box">
    <h2>Your Cart</h2>
    <div id="cartList"></div>
    <p id="totalText"><b>Subtotal: €0</b></p>
    <button id="checkoutBtn" class="btn" type="button" style="display:none;">Checkout / Payment</button>
  </div>

  <script>
    var cart = [];

    // this gets first image from images list
    function getMainImage(product) {
      if (product.images && String(product.images).trim() !== "") {
        var list = String(product.images).split(",");
        return list[0].trim();
      }
      return product.image || "https://via.placeholder.com/100x100?text=No+Image";
    }

    // this renders cart items and subtotal
    function renderCart() {
      var list = document.getElementById("cartList");
      var checkoutBtn = document.getElementById("checkoutBtn");
      var total = 0;
      while (list.firstChild) {
        list.removeChild(list.firstChild);
      }

      if (cart.length === 0) {
        var emptyP = document.createElement("p");
        emptyP.textContent = "Your cart is empty.";
        list.appendChild(emptyP);
      } else {
        for (var i = 0; i < cart.length; i++) {
          total = total + Number(cart[i].price);

          var row = document.createElement("div");
          row.className = "item";

          var left = document.createElement("div");
          left.className = "itemLeft";

          var thumb = document.createElement("img");
          thumb.className = "thumb";
          thumb.src = getMainImage(cart[i]);
          thumb.alt = cart[i].name ? String(cart[i].name) : "Product";

          var label = document.createElement("span");
          var nameTxt = String(cart[i].name || "");
          var descTxt = String(cart[i].description || "");
          if (descTxt.length > 60) {
            descTxt = descTxt.slice(0, 60) + "...";
          }
          label.textContent = nameTxt + (descTxt ? " - " + descTxt : "") + " - €" + String(cart[i].price != null ? cart[i].price : "");

          left.appendChild(thumb);
          left.appendChild(label);

          var removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "removeBtn";
          removeBtn.textContent = "Remove";
          (function (idx) {
            removeBtn.addEventListener("click", function () {
              removeItem(idx);
            });
          })(i);

          row.appendChild(left);
          row.appendChild(removeBtn);
          list.appendChild(row);
        }
      }

      var totalEl = document.getElementById("totalText");
      totalEl.textContent = "";
      var totalBold = document.createElement("b");
      totalBold.textContent = "Subtotal: €" + Number(total).toFixed(2);
      totalEl.appendChild(totalBold);

      var userId = localStorage.getItem("user_id");
      var userRole = localStorage.getItem("user_role") || "";
      if (checkoutBtn) {
        var canCheckout = !!userId && cart.length > 0 && userRole !== "seller";
        checkoutBtn.style.display = canCheckout ? "inline-block" : "none";
      }
    }

    var checkoutBtn = document.getElementById("checkoutBtn");
    if (checkoutBtn) {
      checkoutBtn.addEventListener("click", function() {
        var userId = localStorage.getItem("user_id");
        var userRole = localStorage.getItem("user_role") || "";
        if (!userId) {
          alert("Please login first.");
          location.href = "login.html";
          return;
        }
        if (userRole === "seller") {
          alert("Sellers cannot checkout.");
          return;
        }
        location.href = "account.html";
      });
    }

    function loadCart() {
      fetch("../backend/get_cart.php", { credentials: "include" })
        .then(function(res) { return res.json(); })
        .then(function(r) {
          if (!r.success) {
            cart = [];
            renderCart();
            return;
          }
          cart = Array.isArray(r.items) ? r.items : [];
          renderCart();
        });
    }

    // this removes one item from cart by product id
    function removeItem(index) {
      if (!cart[index] || cart[index].id == null) {
        return;
      }
      var data = new FormData();
      data.append("product_id", cart[index].id);
      fetch("../backend/remove_cart_item.php", {
        method: "POST",
        body: data,
        credentials: "include"
      })
      .then(function(res) { return res.json(); })
      .then(function(r) {
        if (!r.success) {
          alert(r.message || "Could not remove item");
          return;
        }
        loadCart();
      });
    }

    loadCart();
  </script>

  <script>
    // this updates nav links based on login state
    function renderAuthNav() {
      var userId = localStorage.getItem("user_id");
      var userName = localStorage.getItem("user_name") || "User";
      var userRole = localStorage.getItem("user_role") || "";
      var loginLink = document.getElementById("navLogin");
      var registerLink = document.getElementById("navRegister");
      var logoutLink = document.getElementById("navLogout");
      var userText = document.getElementById("navUser");
      var alertsLink = document.getElementById("navAlerts");
      var cartLink = document.getElementById("navCart");
      var addProductLink = document.getElementById("navAddProduct");
      var accountLink = document.getElementById("navAccount");

      if (!loginLink || !registerLink || !logoutLink || !userText) {
        return;
      }

      if (userId) {
        loginLink.style.display = "none";
        registerLink.style.display = "none";
        logoutLink.style.display = "inline";
        userText.style.display = "inline";
        userText.innerText = "Hi, " + userName;

        if (addProductLink) {
          addProductLink.style.display = (userRole === "seller" || userRole === "admin") ? "inline" : "none";
        }
        if (accountLink) { accountLink.style.display = "inline"; }

        if (userRole === "seller") {
          if (alertsLink) { alertsLink.style.display = "none"; }
          if (cartLink) { cartLink.style.display = "none"; }
        } else {
          if (alertsLink) { alertsLink.style.display = "inline"; }
          if (cartLink) { cartLink.style.display = "inline"; }
        }
      } else {
        loginLink.style.display = "inline";
        registerLink.style.display = "inline";
        logoutLink.style.display = "none";
        userText.style.display = "none";

        if (alertsLink) { alertsLink.style.display = "none"; }
        if (addProductLink) { addProductLink.style.display = "none"; }
        if (accountLink) { accountLink.style.display = "none"; }
        if (cartLink) { cartLink.style.display = "inline"; }
      }
    }

    // this logs user out
    function logoutUser() {
      localStorage.removeItem("user_id");
      localStorage.removeItem("user_name");
      localStorage.removeItem("user_role");
      alert("Logged out");
      location.href = "index.html";
    }

    renderAuthNav();
  </script>

</body>
</html>
