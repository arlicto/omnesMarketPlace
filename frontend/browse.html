<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnes MarketPlace - Browse</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    nav { background: #1f4fd6; padding: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    nav a { color: white; text-decoration: none; margin-right: 12px; font-size: 16px; }
    .logo { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; background: white; }
    .authRight { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .wrap { max-width: 1000px; margin: 20px auto; }
    .cards { display: flex; flex-wrap: wrap; gap: 15px; }
    .card { background: white; width: 220px; padding: 10px; border-radius: 6px; }
    /* dynamic image style: show full image without cutting */
    .card img { width: 100%; height: auto; max-height: 260px; object-fit: contain; border-radius: 4px; background: #f7f7f7; }
    .btn { background: #2d6cdf; color: white; border: 0; padding: 8px 10px; border-radius: 4px; cursor: pointer; }
    .row { margin-top: 8px; display: flex; gap: 8px; }
    .catSection { margin-bottom: 32px; }
    .catSection h3 { margin-bottom: 12px; color: #20325e; }
    .muted { color: #666; font-size: 14px; }

    @media (max-width: 768px) {
      nav { padding: 10px; gap: 8px; }
      nav a { font-size: 14px; margin-right: 8px; }
      .logo, .brand img { width: 32px !important; height: 32px !important; }
      .authRight { width: 100%; justify-content: flex-end; }

      .container, .wrap, .box { width: auto; margin: 12px; padding: 14px; }
      .cards { gap: 10px; }
      .card { width: 100% !important; box-sizing: border-box; }

      input, select, textarea, button, .btn { width: 100%; box-sizing: border-box; }
      .row, .heroActions, .slideBtns { flex-direction: column; }

      #cartBadge { margin-left: 0 !important; }
    }

  </style>
</head>
<body>
  <nav>
    <img class="logo" src="../images/omnesMarketshop.jpeg" alt="Omnes logo">
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a id="navAlerts" href="notifications.html">Alerts</a>
    <a id="navCart" href="cart.html">Cart</a>
    <a id="navAddProduct" href="add_product.html">Add Product</a>
    <a id="navAccount" href="account.html">My Account</a>
    <a id="navLogin" href="login.html">Login</a>
    <a id="navRegister" href="register.html">Register</a>
    <span id="cartBadge" style="color:white; font-size:14px; background:rgba(255,255,255,0.18); padding:3px 8px; border-radius:999px;">Cart: 0</span>
    <span class="authRight">
      <a id="navLogout" href="#" onclick="logoutUser()" style="display:none;">Logout</a>
      <span id="navUser" style="display:none; color:white; font-size:16px;">Hi, User</span>
    </span>
  </nav>

  <div class="wrap">
    <h2>Browse Products</h2>

    <div class="catSection">
      <h3>Rare Items</h3>
      <div id="productsRare" class="cards"></div>
    </div>

    <div class="catSection">
      <h3>High-End Items</h3>
      <div id="productsHighEnd" class="cards"></div>
    </div>

    <div class="catSection">
      <h3>Regular Items</h3>
      <div id="productsRegular" class="cards"></div>
    </div>
  </div>

  <script>
    // this gets first image from images list
    function getMainImage(product) {
      if (product.images && product.images.trim() !== "") {
        var list = product.images.split(",");
        return list[0].trim();
      }
      return product.image || "https://via.placeholder.com/300x200?text=No+Image";
    }

    // this fills one category section from the API
    function fillSection(containerId, categoryValue) {
      var box = document.getElementById(containerId);
      box.innerHTML = "<p class='muted'>Loading...</p>";

      fetch("../backend/get_products.php?category=" + encodeURIComponent(categoryValue))
        .then(function(res) { return res.json(); })
        .then(function(data) {
          box.innerHTML = "";

          if (!data.success) {
            box.innerHTML = "<p>No products found.</p>";
            return;
          }

          if (data.products.length === 0) {
            box.innerHTML = "<p>No items in this category yet.</p>";
            return;
          }

          data.products.forEach(function(p) {
            var card = document.createElement("div");
            card.className = "card";
            card.innerHTML =
              "<img src='" + getMainImage(p) + "' alt='product'>" +
              "<h3>" + p.name + "</h3>" +
              "<p>Price: €" + p.price + "</p>";

            card.onclick = function() {
              location.href = "product.html?id=" + p.id;
            };

            var row = document.createElement("div");
            row.className = "row";

            var viewBtn = document.createElement("button");
            viewBtn.className = "btn";
            viewBtn.innerText = "View";
            viewBtn.onclick = function(e) {
              e.stopPropagation();
              location.href = "product.html?id=" + p.id;
            };

            var btn = document.createElement("button");
            btn.className = "btn";
            var saleType = String(p.sale_type || "").toLowerCase();
            if (saleType === "auction") {
              btn.innerText = "Bid";
              btn.onclick = function(e) {
                e.stopPropagation();
                location.href = "product.html?id=" + p.id;
              };
            } else if (saleType === "negotiation") {
              btn.innerText = "Negotiate";
              btn.onclick = function(e) {
                e.stopPropagation();
                location.href = "product.html?id=" + p.id;
              };
            } else {
              btn.innerText = "Add to Cart";
              btn.onclick = function(e) {
                e.stopPropagation();
                addToCart(p);
              };
            }

            row.appendChild(viewBtn);
            row.appendChild(btn);
            card.appendChild(row);
            box.appendChild(card);
          });
        })
        .catch(function() {
          box.innerHTML = "<p>Could not load products.</p>";
        });
    }

    fillSection("productsRare", "rare");
    fillSection("productsHighEnd", "high-end");
    fillSection("productsRegular", "regular");

    // this buys selected product immediately (buy_now only)
    function addToCart(product) {
      // simple frontend auth check
      var userId = localStorage.getItem("user_id");
      if (!userId) {
        alert("Please login first to add products to cart.");
        location.href = "login.html";
        return;
      }

      var saleType = String(product.sale_type || "").toLowerCase();
      if (saleType !== "buy_now") {
        alert("This item is not available for immediate purchase.");
        return;
      }

      var data = new FormData();
      data.append("product_id", product.id);

      fetch("../backend/buy_product.php", {
        method: "POST",
        body: data,
        credentials: "include"
      })
      .then(function(res) { return res.json(); })
      .then(function(r) {
        if (!r.success) {
          alert(r.message || "Could not buy product");
          return;
        }
        updateCartBadge();
        alert("Purchase successful");
      });
    }

    // this updates cart count badge from server cart
    function updateCartBadge() {
      var badge = document.getElementById("cartBadge");
      if (badge) {
        var userId = localStorage.getItem("user_id");
        if (!userId) {
          badge.innerText = "Cart: 0";
          return;
        }

        fetch("../backend/get_cart.php", { credentials: "include" })
          .then(function(res) { return res.json(); })
          .then(function(r) {
            var count = (r && r.success && Array.isArray(r.items)) ? r.items.length : 0;
            badge.innerText = "Cart: " + count;
          })
          .catch(function() {
            badge.innerText = "Cart: 0";
          });
      }
    }

    updateCartBadge();
  </script>

  <script>
    // this updates nav links based on login state
    function renderAuthNav() {
      var userId = localStorage.getItem("user_id");
      var userName = localStorage.getItem("user_name") || "User";
      var userRole = localStorage.getItem("user_role") || "";
      var loginLink = document.getElementById("navLogin");
      var registerLink = document.getElementById("navRegister");
      var logoutLink = document.getElementById("navLogout");
      var userText = document.getElementById("navUser");
      var alertsLink = document.getElementById("navAlerts");
      var cartLink = document.getElementById("navCart");
      var cartBadge = document.getElementById("cartBadge");
      var addProductLink = document.getElementById("navAddProduct");
      var accountLink = document.getElementById("navAccount");

      if (!loginLink || !registerLink || !logoutLink || !userText) {
        return;
      }

      if (userId) {
        loginLink.style.display = "none";
        registerLink.style.display = "none";
        logoutLink.style.display = "inline";
        userText.style.display = "inline";
        userText.innerText = "Hi, " + userName;

        if (addProductLink) {
          addProductLink.style.display = (userRole === "seller" || userRole === "admin") ? "inline" : "none";
        }

        if (userRole === "seller") {
          if (alertsLink) { alertsLink.style.display = "none"; }
          if (cartLink) { cartLink.style.display = "none"; }
          if (cartBadge) { cartBadge.style.display = "none"; }
          if (accountLink) { accountLink.style.display = "inline"; }
        } else {
          if (alertsLink) { alertsLink.style.display = "inline"; }
          if (cartLink) { cartLink.style.display = "inline"; }
          if (cartBadge) { cartBadge.style.display = "inline"; }
          if (accountLink) { accountLink.style.display = "inline"; }
        }
      } else {
        loginLink.style.display = "inline";
        registerLink.style.display = "inline";
        logoutLink.style.display = "none";
        userText.style.display = "none";

        if (alertsLink) { alertsLink.style.display = "none"; }
        if (addProductLink) { addProductLink.style.display = "none"; }
        if (accountLink) { accountLink.style.display = "none"; }
        if (cartLink) { cartLink.style.display = "inline"; }
        if (cartBadge) { cartBadge.style.display = "inline"; }
      }
    }

    // this logs user out
    function logoutUser() {
      localStorage.removeItem("user_id");
      localStorage.removeItem("user_name");
      localStorage.removeItem("user_role");
      alert("Logged out");
      location.href = "index.html";
    }

    renderAuthNav();
  </script>

</body>
</html>
